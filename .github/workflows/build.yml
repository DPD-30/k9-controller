name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Super-Linter for comprehensive code quality
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter@v7
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Enable specific linters
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_JSCPD: true
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          # Disable unnecessary linters
          VALIDATE_DOCKERFILE: false
          VALIDATE_BASH: false
          VALIDATE_SHELL_SHFMT: false
          JAVASCRIPT_ES_CONFIG_FILE: .eslintrc.json

  build:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build UI (if workspace exists)
        run: npm run build
        continue-on-error: true
        if: hashFiles('ui/package.json') != ''

      - name: Clean build artifacts
        run: npm run clean

  # Additional job for Raspberry Pi specific testing
  pi-compat:
    runs-on: ubuntu-latest
    name: Pi Compatibility Check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for ARM-compatible native modules
        run: |
          echo "Checking package.json for native modules..."
          # List packages that may need ARM compilation
          npm ls | grep -E "(serialport|node-hid|i2c-bus|onoff|pigpio)" || echo "No hardware-specific modules found in dependencies"

      - name: Validate engine requirements
        run: |
          node -e "const pkg = require('./package.json'); console.log('Node engine requirement:', pkg.engines?.node || 'not specified')"
